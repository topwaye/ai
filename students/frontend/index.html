<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学生管理系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 32px;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 16px;
            opacity: 0.9;
        }

        .search-section {
            padding: 30px;
            background: #f8f9fa;
            border-bottom: 2px solid #e9ecef;
        }

        .search-form {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
        }

        .search-form input[type="text"],
        .search-form select {
            flex: 1;
            min-width: 200px;
            padding: 12px 15px;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .search-form input[type="text"]:focus,
        .search-form select:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
        }

        .btn-success {
            background: #11998e;
            color: white;
        }

        .btn-success:hover {
            background: #0e7c73;
        }

        .btn-warning {
            background: #f5576c;
            color: white;
        }

        .btn-warning:hover {
            background: #e04a5e;
        }

        .btn-danger {
            background: #ff416c;
            color: white;
        }

        .btn-danger:hover {
            background: #e6385f;
        }

        .btn-small {
            padding: 8px 15px;
            font-size: 12px;
        }

        .table-section {
            padding: 30px;
        }

        .table-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .table-header h2 {
            color: #333;
            font-size: 24px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th {
            background: #667eea;
            color: white;
            padding: 15px;
            text-align: left;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 13px;
            letter-spacing: 0.5px;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid #e9ecef;
            color: #555;
        }

        tr:hover {
            background: #f8f9fa;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #999;
            font-size: 16px;
        }

        .no-data {
            text-align: center;
            padding: 40px;
            color: #999;
            font-size: 16px;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            background-color: white;
            margin: 5% auto;
            padding: 0;
            border-radius: 10px;
            width: 90%;
            max-width: 600px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from {
                transform: translateY(-50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px 30px;
            border-radius: 10px 10px 0 0;
        }

        .modal-header h2 {
            margin: 0;
            font-size: 20px;
        }

        .close {
            color: white;
            float: right;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            line-height: 20px;
        }

        .close:hover {
            opacity: 0.8;
        }

        .modal-body {
            padding: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
        }

        .form-group input[type="date"] {
            cursor: pointer;
        }

        .form-row {
            display: flex;
            gap: 20px;
        }

        .form-row .form-group {
            flex: 1;
        }

        .form-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 30px;
        }

        .form-page {
            display: none;
        }

        .form-page.active {
            display: block;
        }

        .form-page h3 {
            margin-bottom: 20px;
            color: #667eea;
            font-size: 18px;
            padding-bottom: 10px;
            border-bottom: 2px solid #e9ecef;
        }

        .message {
            padding: 15px;
            margin: 20px 0;
            border-radius: 8px;
            display: none;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        @media (max-width: 768px) {
            .search-form {
                flex-direction: column;
            }

            .search-form input[type="text"],
            .search-form select,
            .btn {
                width: 100%;
            }

            .form-row {
                flex-direction: column;
                gap: 0;
            }

            table {
                font-size: 12px;
            }

            th, td {
                padding: 10px;
            }

            .btn-small {
                padding: 6px 10px;
                font-size: 11px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>学生管理系统</h1>
            <p>高效管理学生信息，提升教育服务质量</p>
        </div>

        <div class="search-section">
            <div class="search-form">
                <input type="text" id="searchInput" placeholder="输入学号或姓名搜索...">
                <select id="searchType">
                    <option value="keyword">关键词搜索</option>
                    <option value="name">按姓名</option>
                    <option value="major">按专业</option>
                    <option value="gender">按性别</option>
                </select>
                <button class="btn btn-primary" onclick="searchStudents()">搜索</button>
                <button class="btn btn-success" onclick="showAddModal()">添加学生</button>
                <button class="btn btn-warning" onclick="loadAllStudents()">显示全部</button>
            </div>
        </div>

        <div class="table-section">
            <div class="table-header">
                <h2>学生列表</h2>
                <span id="studentCount" style="color: #666;"></span>
            </div>

            <div id="message" class="message"></div>

            <div id="loading" class="loading">加载中...</div>
            <div id="noData" class="no-data" style="display: none;">暂无学生数据</div>

            <table id="studentTable">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>学号</th>
                        <th>姓名</th>
                        <th>性别</th>
                        <th>年龄</th>
                        <th>专业</th>
                        <th>邮箱</th>
                        <th>电话</th>
                        <th>入学日期</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="studentTableBody">
                </tbody>
            </table>
        </div>
    </div>

    <!-- 添加/编辑学生模态框 -->
    <div id="studentModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <span class="close" onclick="closeModal()">&times;</span>
                <h2 id="modalTitle">添加学生</h2>
            </div>
            <div class="modal-body">
                <form id="studentForm">
                    <input type="hidden" id="studentId">

                    <!-- 第一页：基本信息 -->
                    <div id="formPage1" class="form-page active">
                        <h3>基本信息</h3>

                        <div class="form-group">
                            <label for="name">学生姓名 *</label>
                            <input type="text" id="name" required>
                        </div>

                        <div class="form-group">
                            <label for="studentIdNumber">学号 *</label>
                            <input type="text" id="studentIdNumber" required>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label for="gender">性别 *</label>
                                <select id="gender" required>
                                    <option value="">请选择</option>
                                    <option value="男">男</option>
                                    <option value="女">女</option>
                                </select>
                            </div>

                            <div class="form-group">
                                <label for="age">年龄 *</label>
                                <input type="number" id="age" min="1" max="120" required>
                            </div>
                        </div>

                        <div class="form-actions">
                            <button type="button" class="btn btn-warning" onclick="closeModal()">取消</button>
                            <button type="button" id="nextPageBtn" class="btn btn-primary" onclick="nextPage()">下一步</button>
                        </div>
                    </div>

                    <!-- 第二页：详细信息 -->
                    <div id="formPage2" class="form-page">
                        <h3>详细信息</h3>

                        <div class="form-group">
                            <label for="major">专业</label>
                            <input type="text" id="major">
                        </div>

                        <div class="form-group">
                            <label for="email">邮箱</label>
                            <input type="email" id="email">
                        </div>

                        <div class="form-group">
                            <label for="phone">电话</label>
                            <input type="text" id="phone">
                        </div>

                        <div class="form-group">
                            <label for="address">地址</label>
                            <input type="text" id="address">
                        </div>

                        <div class="form-group">
                            <label for="enrollmentDate">入学日期</label>
                            <input type="date" id="enrollmentDate">
                        </div>

                        <div class="form-actions">
                            <button type="button" class="btn btn-warning" onclick="prevPage()">上一步</button>
                            <button type="submit" class="btn btn-success">保存</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
